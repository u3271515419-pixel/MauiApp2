<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Interaktywna Biblioteka</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>📚 Interaktywna Biblioteka</h1>

        <div class="books-list">
            <h2>Dostępne książki:</h2>
            <ul id="bookList"></ul>
        </div>

        <div class="chat-container">
            <h2>Czat z asystentem</h2>
            <div id="chatBox" class="chat-box"></div>
            <input type="text" id="userInput" placeholder="Zadaj pytanie o książkę...">
            <button onclick="sendMessage()">Wyślij</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
